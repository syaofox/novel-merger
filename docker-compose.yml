version: '3.8'

services:
  backend:
    build: ./backend
    container_name: novel-backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - ENV=development

  frontend:
    build: ./frontend
    container_name: novel-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
