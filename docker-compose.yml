services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novel-backend-dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - ENV=development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novel-frontend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
